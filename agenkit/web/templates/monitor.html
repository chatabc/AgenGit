<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgenGit - 执行监控</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
        }
        .content {
            margin-left: 250px;
            padding: 20px;
        }
        .nav-link {
            color: #adb5bd;
        }
        .nav-link:hover {
            color: white;
            background-color: #495057;
        }
        .nav-link.active {
            color: white;
            background-color: #495057;
        }
        .card {
            margin-bottom: 20px;
        }
        .table-container {
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="text-center mb-4">
            <h2>AgenGit</h2>
            <p class="text-sm text-muted">AI Agent 治理</p>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('index') }}">首页</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="{{ url_for('monitor') }}">执行监控</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('security') }}">安全管理</a>
            </li>
            {% if session['role'] == 'admin' %}
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('users') }}">用户管理</a>
            </li>
            {% endif %}
            <li class="nav-item mt-auto p-3">
                <a class="nav-link" href="{{ url_for('logout') }}">退出登录</a>
            </li>
        </ul>
    </div>
    <div class="content">
        <div class="container-fluid">
            <h1>执行监控</h1>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title">活跃执行</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-container">
                                <table class="table table-striped">
                                    <thead>
                                        <tr>
                                            <th>执行ID</th>
                                            <th>Agent</th>
                                            <th>任务</th>
                                            <th>开始时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="activeExecutionsTable">
                                        <tr>
                                            <td colspan="5" class="text-center">加载中...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title">执行历史</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-container">
                                <table class="table table-striped">
                                    <thead>
                                        <tr>
                                            <th>执行ID</th>
                                            <th>状态</th>
                                            <th>任务</th>
                                            <th>开始时间</th>
                                            <th>时长</th>
                                        </tr>
                                    </thead>
                                    <tbody id="executionHistoryTable">
                                        <tr>
                                            <td colspan="5" class="text-center">加载中...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 获取活跃执行
        function getActiveExecutions() {
            fetch('/active')
                .then(response => response.json())
                .then(data => {
                    const tableBody = document.getElementById('activeExecutionsTable');
                    tableBody.innerHTML = '';
                    
                    if (data.error) {
                        tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">' + data.error + '</td></tr>';
                        return;
                    }
                    
                    if (data.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="5" class="text-center">暂无活跃执行</td></tr>';
                        return;
                    }
                    
                    data.forEach(execution => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${execution.execution_id}</td>
                            <td>${execution.agent}</td>
                            <td>${execution.task}</td>
                            <td>${new Date(execution.start_time).toLocaleString()}</td>
                            <td>
                                <button class="btn btn-sm btn-danger terminate-btn" data-id="${execution.execution_id}">终止</button>
                            </td>
                        `;
                        tableBody.appendChild(row);
                    });
                    
                    // 添加终止按钮事件
                    document.querySelectorAll('.terminate-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const executionId = this.getAttribute('data-id');
                            terminateExecution(executionId);
                        });
                    });
                });
        }
        
        // 获取执行历史
        function getExecutionHistory() {
            fetch('/history')
                .then(response => response.json())
                .then(data => {
                    const tableBody = document.getElementById('executionHistoryTable');
                    tableBody.innerHTML = '';
                    
                    if (data.error) {
                        tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">' + data.error + '</td></tr>';
                        return;
                    }
                    
                    if (data.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="5" class="text-center">暂无执行历史</td></tr>';
                        return;
                    }
                    
                    data.forEach(record => {
                        const row = document.createElement('tr');
                        const duration = record.duration ? record.duration.toFixed(2) + 's' : '-';
                        row.innerHTML = `
                            <td>${record.execution_id}</td>
                            <td>${record.status}</td>
                            <td>${record.task}</td>
                            <td>${new Date(record.start_time).toLocaleString()}</td>
                            <td>${duration}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                });
        }
        
        // 终止执行
        function terminateExecution(executionId) {
            if (confirm('确定要终止这个执行吗？')) {
                fetch(`/terminate/${executionId}`)
                    .then(response => response.json())
                    .then(data => {
                        alert('终止结果: ' + JSON.stringify(data));
                        getActiveExecutions();
                    });
            }
        }
        
        // 页面加载时获取数据
        window.onload = function() {
            getActiveExecutions();
            getExecutionHistory();
            
            // 每5秒刷新一次
            setInterval(() => {
                getActiveExecutions();
            }, 5000);
        };
    </script>
</body>
</html>
