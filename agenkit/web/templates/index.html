<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgenGit - 主页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            background-color: #343a40;
            color: white;
            padding-top: 20px;
        }
        .content {
            margin-left: 250px;
            padding: 20px;
        }
        .nav-link {
            color: #adb5bd;
        }
        .nav-link:hover {
            color: white;
            background-color: #495057;
        }
        .nav-link.active {
            color: white;
            background-color: #495057;
        }
        .card {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="text-center mb-4">
            <h2>AgenGit</h2>
            <p class="text-sm text-muted">AI Agent 治理</p>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link active" href="{{ url_for('index') }}">首页</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('monitor') }}">执行监控</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('security') }}">安全管理</a>
            </li>
            {% if session['role'] == 'admin' %}
            <li class="nav-item">
                <a class="nav-link" href="{{ url_for('users') }}">用户管理</a>
            </li>
            {% endif %}
            <li class="nav-item mt-auto p-3">
                <a class="nav-link" href="{{ url_for('logout') }}">退出登录</a>
            </li>
        </ul>
    </div>
    <div class="content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>欢迎回来，{{ username }}</h1>
                <div class="text-muted">当前角色: {{ session['role'] }}</div>
            </div>
            
            <div class="row">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title">快速操作</h5>
                        </div>
                        <div class="card-body">
                            <button class="btn btn-primary w-100 mb-2" data-bs-toggle="modal" data-bs-target="#executeModal">执行任务</button>
                            <a href="{{ url_for('monitor') }}" class="btn btn-secondary w-100 mb-2">查看监控</a>
                            <a href="{{ url_for('security') }}" class="btn btn-secondary w-100">安全管理</a>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title">系统状态</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="text-center">
                                        <h4 id="activeExecutions">0</h4>
                                        <p class="text-muted">活跃执行</p>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="text-center">
                                        <h4 id="totalExecutions">0</h4>
                                        <p class="text-muted">总执行数</p>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="text-center">
                                        <h4 id="violations">0</h4>
                                        <p class="text-muted">安全违规</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 执行任务模态框 -->
    <div class="modal fade" id="executeModal" tabindex="-1" aria-labelledby="executeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="executeModalLabel">执行任务</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="taskInput" class="form-label">任务内容</label>
                        <textarea class="form-control" id="taskInput" rows="3" placeholder="请输入任务内容"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="executeBtn">执行</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 获取系统状态
        function getSystemStatus() {
            fetch('/active')
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        document.getElementById('activeExecutions').textContent = data.length;
                    }
                });
            
            fetch('/history')
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        document.getElementById('totalExecutions').textContent = data.length;
                    }
                });
            
            fetch('/violations')
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        document.getElementById('violations').textContent = data.length;
                    }
                });
        }
        
        // 执行任务
        document.getElementById('executeBtn').addEventListener('click', function() {
            const task = document.getElementById('taskInput').value;
            if (task) {
                fetch('/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ task: task })
                })
                .then(response => response.json())
                .then(data => {
                    alert('执行结果: ' + JSON.stringify(data));
                    getSystemStatus();
                    document.getElementById('taskInput').value = '';
                    const modal = bootstrap.Modal.getInstance(document.getElementById('executeModal'));
                    modal.hide();
                });
            }
        });
        
        // 页面加载时获取系统状态
        window.onload = getSystemStatus;
    </script>
</body>
</html>
